<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple Navigation Bar</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    nav {
      background-color: #333;
      padding: 12px 20px;
    }

    nav ul {
      list-style: none;
      display: flex;
      gap: 20px;
    }

    nav ul li a {
      color: white;
      text-decoration: none;
      padding: 10px 16px;
      border-radius: 5px;
      transition: background-color 0.3s;
    }

    nav ul li a:hover {
      background-color: #555;
    }
  </style>
</head>
<body>

  <nav>
    <ul>
      <li><a href="">Home</a></li>
      <li><a href="">Add</a></li>
      <li><a href="">Show</a></li>
    </ul>
  </nav>
  
</body>
</html>
